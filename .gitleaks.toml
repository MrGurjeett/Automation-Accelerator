# Gitleaks configuration for CI/CD secret scanning
# https://github.com/gitleaks/gitleaks

title = "Automation Accelerator — gitleaks config"

[allowlist]
  description = "Global allow-list"
  paths = [
    '''.env\.example$''',
    '''\.secrets\.baseline$''',
    '''node_modules/''',
    '''\.venv/''',
  ]

# ── Custom rules ──────────────────────────────────────────────────────────

[[rules]]
  id = "azure-openai-api-key"
  description = "Azure OpenAI API key"
  regex = '''(?i)(azure[_-]?openai[_-]?(?:api[_-]?)?key)\s*[=:]\s*['"]?([A-Za-z0-9+/=]{20,})['"]?'''
  tags = ["key", "azure"]

[[rules]]
  id = "generic-api-key"
  description = "Generic API key assignment"
  regex = '''(?i)(api[_-]?key|secret[_-]?key|access[_-]?token)\s*[=:]\s*['"]?([A-Za-z0-9+/=_-]{16,})['"]?'''
  tags = ["key", "generic"]

[[rules]]
  id = "password-in-config"
  description = "Password in configuration"
  regex = '''(?i)(password|passwd)\s*[=:]\s*['"]?(?!\$\{)(?!<your-)([^'"$\s]{4,})['"]?'''
  tags = ["password"]

[[rules]]
  id = "smtp-password"
  description = "SMTP / Email password"
  regex = '''(?i)(smtp[_-]?pass|sender[_-]?password|email[_-]?password)\s*[=:]\s*['"]?(?!\$\{)(?!<your-)([^'"$\s]{4,})['"]?'''
  tags = ["password", "email"]
