[pytest]
# Test discovery
testpaths = tests features
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# BDD
bdd_features_base_dir = features/

# Playwright browser settings
# --headed forces browser to be visible (not headless)
# --browser chromium specifies which browser to use
addopts = 
    --headed
    --browser chromium
    --strict-markers
    --tb=short
    --disable-warnings
    -v
    --html=reports/report.html
    --self-contained-html

# Markers
markers =
    smoke: Smoke tests
    regression: Regression tests
    api: API tests
    ui: UI tests
    slow: Slow running tests
    skip_ci: Skip in CI/CD pipeline

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Timeout
timeout = 300
